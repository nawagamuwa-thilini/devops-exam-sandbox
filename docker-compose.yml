version: '3.8'

services:

  web-api:
    build: .

    ports:
      - "127.0.0.1:5000:5000"

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

    read_only: true

    restart: always

    depends_on:
      - broker

    networks:
      - internal

  broker:
    image: redis:7.2-alpine

    command: redis-server --requirepass ${REDIS_PASSWORD}

    expose:
      - "6379"

    networks:
      - internal

networks:
  internal:
    driver: bridge